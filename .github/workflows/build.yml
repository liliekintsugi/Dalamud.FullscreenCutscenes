name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" `
            -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud-dist
          echo "DALAMUD_HOME=${{ github.workspace }}\dalamud-dist" >> $env:GITHUB_ENV

      - name: Restore
        run: dotnet restore Dalamud.FullscreenCutscenes/Dalamud.FullscreenCutscenes.csproj

      - name: Build
        run: dotnet build Dalamud.FullscreenCutscenes/Dalamud.FullscreenCutscenes.csproj -c Release --no-restore -p:IsCI=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dalamud.FullscreenCutscenes
          path: Dalamud.FullscreenCutscenes/bin/Release/Dalamud.FullscreenCutscenes/

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Dalamud.FullscreenCutscenes/bin/Release/Dalamud.FullscreenCutscenes/*
          generate_release_notes: true
