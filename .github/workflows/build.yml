name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" `
            -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath dalamud-dist
          echo "DALAMUD_HOME=${{ github.workspace }}\dalamud-dist" >> $env:GITHUB_ENV

      - name: Restore
        run: dotnet restore Dalamud.FullscreenCutscenes/Dalamud.FullscreenCutscenes.csproj

      - name: Build
        run: dotnet build Dalamud.FullscreenCutscenes/Dalamud.FullscreenCutscenes.csproj -c Release --no-restore -p:IsCI=true

      - name: Collect release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-files
          $releasePath = "Dalamud.FullscreenCutscenes/bin/Release"
          if (!(Test-Path $releasePath)) {
            Write-Error "Release build output not found at $releasePath"
            exit 1
          }
          Get-ChildItem -Recurse -Path $releasePath -Include "*.zip","*.json" | ForEach-Object {
            Write-Host "Found: $($_.FullName)"
            Copy-Item $_.FullName release-files/
          }
          $count = (Get-ChildItem release-files/).Count
          if ($count -eq 0) {
            Write-Error "No release files collected"
            exit 1
          }
          Write-Host "--- release-files contents ($count files) ---"
          Get-ChildItem release-files/

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Dalamud.FullscreenCutscenes
          path: release-files/

      - name: Verify repo.json version sync
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $manifestPath = Get-ChildItem -Recurse release-files -Filter "UltrawideCutscenes.json" | Select-Object -First 1
          if (-not $manifestPath) {
            Write-Error "UltrawideCutscenes.json not found in release-files"
            exit 1
          }
          $manifest = Get-Content $manifestPath.FullName | ConvertFrom-Json
          $repoJson = Invoke-RestMethod -Uri "https://raw.githubusercontent.com/liliekintsugi/xivdash-connect/main/repo.json"
          $entry = $repoJson | Where-Object { $_.InternalName -eq "UltrawideCutscenes" } | Select-Object -First 1
          if (-not $entry) {
            Write-Error "UltrawideCutscenes entry not found in xivdash-connect repo.json"
            exit 1
          }
          if ($entry.AssemblyVersion -ne $manifest.AssemblyVersion) {
            Write-Error @"
          repo.json is out of sync!
            Release manifest: $($manifest.AssemblyVersion)
            repo.json entry:  $($entry.AssemblyVersion)

          Update xivdash-connect/repo.json before installing from Dalamud.
          The daily sync workflow will catch up, or run it manually:
          https://github.com/liliekintsugi/xivdash-connect/actions/workflows/sync-ultrawide-repo.yml
          "@
            exit 1
          }
          Write-Host "repo.json version OK: $($manifest.AssemblyVersion)"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: release-files/*
          generate_release_notes: true
